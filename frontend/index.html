<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azimut</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Stamp the saved theme before first paint so light-mode users never see
      // a dark flash. Mirrors lib/theme.js; dark is the default.
      try {
        var t = localStorage.getItem('azimut:theme');
        document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
