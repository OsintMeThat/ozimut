name: Release

# Cut a release by pushing a semver tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub release + upload assets
  id-token: write   # PyPI Trusted Publishing (OIDC) — no token secret needed

jobs:
  guard:
    name: Version + release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # Install the app (editable) + dev tools, like the CI backend job, so the
      # gate can import azimut and run its tests. No frontend build: these tests
      # don't touch the built UI, and the app tolerates a missing static dir.
      - run: uv sync --frozen --extra dev
      # The pushed tag must equal the version baked into the code. When it
      # didn't (0.2.2 shipped a stale __version__), the binary's self-update
      # check nagged every user about the very release they were running. This
      # is the check the release used to lack — it runs before anything builds.
      - name: Tag matches the code version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(uv run --no-sync python -c 'import azimut; print(azimut.__version__)')"
          echo "tag=$tag  __version__=$ver"
          [ "$tag" = "$ver" ] || { echo "::error::tag v$tag != __version__ $ver — bump src/azimut/__init__.py"; exit 1; }
      # The version-parity gate the release workflow used to skip: pyproject's
      # single-sourced version and the extension manifest must line up.
      - name: Release gate + version parity
        run: uv run --no-sync pytest tests/test_release_gate.py tests/test_updates.py -q

  dist:
    name: Build wheel + sdist
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build frontend into the package
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build sdist + wheel
        run: |
          uv sync --frozen --no-dev --group release --no-install-project
          uv run --no-sync python -m build --no-isolation
      - name: Sanity-check the wheel bundles the UI
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          n = [x for x in zipfile.ZipFile(whl).namelist() if x.startswith("azimut/static/")]
          assert n, "wheel is missing azimut/static/** — did the frontend build run?"
          print(f"{whl}: {len(n)} static files bundled")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  binaries:
    name: Binary (${{ matrix.os }})
    needs: guard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: azimut-linux-x86_64
          - os: windows-latest
            asset: azimut-windows-x86_64.exe
          - os: macos-latest
            asset: azimut-macos-arm64
          # macos-latest is Apple Silicon. We don't ship an Intel binary: the
          # last Intel runner (macos-13) is deprecated and its queue stalls
          # releases. Intel Macs are covered by `pip install azimut` instead.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.2"
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build frontend into the package
        working-directory: frontend
        run: npm ci && npm run build
      # The wheel only declares its dependencies, but the binary contains them.
      # Application and release tooling both come from the same lock.
      - name: Install locked application and release tooling
        run: |
          uv sync --frozen --no-dev --group release --no-install-project
          uv sync --frozen --no-dev --group release --no-build-isolation --no-editable
      # ffmpeg is a native program, not a Python dep, so it isn't in the wheel.
      # Vendor a static ffmpeg + ffprobe per-OS so the binary works out of the
      # box (packaging/azimut.spec picks them up; engine/ffmpeg.py finds them at
      # runtime). One host, one arch per runner; each zip holds a single binary.
      - name: Vendor static ffmpeg + ffprobe into the binary
        shell: bash
        run: |
          mkdir -p packaging/vendor
          if [ "${{ runner.os }}" = "Windows" ]; then
            # martin-riedl.de stopped publishing Windows builds; BtbN's
            # "latest" release tag always points at the newest static win64
            # build, so pull ffmpeg.exe/ffprobe.exe out of its nested bin/.
            curl -fL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
            uv run --no-sync python -c "
          import zipfile
          zf = zipfile.ZipFile('ffmpeg.zip')
          for n in zf.namelist():
              tail = n.rsplit('/', 1)[-1]
              if tail in ('ffmpeg.exe', 'ffprobe.exe'):
                  open('packaging/vendor/' + tail, 'wb').write(zf.read(n))
          "
          else
            case "${{ runner.os }}" in
              Linux) plat=linux/amd64 ;;
              macOS) plat=macos/arm64 ;;
            esac
            base="https://ffmpeg.martin-riedl.de/redirect/latest/$plat/release"
            for tool in ffmpeg ffprobe; do
              curl -fL "$base/$tool.zip" -o "$tool.zip"
              uv run --no-sync python -c "import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall('packaging/vendor')" "$tool.zip"
            done
          fi
          chmod +x packaging/vendor/* 2>/dev/null || true
          ls -l packaging/vendor
      - name: Build single-file binary
        run: uv run --no-sync pyinstaller packaging/azimut.spec --distpath dist-bin --workpath build-bin
      - name: Smoke-test the binary
        shell: bash
        run: |
          BIN=dist-bin/azimut
          [ "${{ runner.os }}" = "Windows" ] && BIN=dist-bin/azimut.exe
          uv run --no-sync python scripts/smoke_binary.py "$BIN"
      - name: Name the asset per-OS
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist-bin/azimut.exe "dist-bin/${{ matrix.asset }}"
          else
            mv dist-bin/azimut "dist-bin/${{ matrix.asset }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist-bin/${{ matrix.asset }}

  release:
    name: GitHub release + PyPI publish
    needs: [dist, binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Gather release assets (binaries + wheel/sdist)
        run: |
          mkdir -p upload
          find artifacts -type f -exec cp {} upload/ \;
          ls -l upload
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          body_path: docs/RELEASE_NOTES.md
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/dist
