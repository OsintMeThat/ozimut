name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly, so the "latest deps" tripwire below reports upstream breakage even
  # in quiet weeks — bit rot doesn't wait for us to push.
  schedule:
    - cron: "0 6 * * 1"

jobs:
  backend:
    name: Backend (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The three OSes we ship binaries for, plus the floor and ceiling of the
        # Python range pyproject claims. Testing one Linux/3.12 box and shipping a
        # Windows exe was a guess; this is what makes "works everywhere" checkable.
        # Filesystem behaviour is where they actually differ — engine/scrapers.py
        # swaps directories, and Windows won't delete an open file.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12"]
        include:
          - os: ubuntu-latest
            python: "3.11"  # the floor in requires-python
          - os: ubuntu-latest
            python: "3.13"  # the ceiling we've tested against
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      # --frozen installs uv.lock exactly and never re-resolves, so a green run
      # means "these versions work", not "whatever PyPI served this morning".
      # --check fails if uv.lock drifted from pyproject.toml (forgot `uv lock`).
      - run: uv lock --check
      - run: uv sync --frozen --extra dev
      - run: uv run pytest -q

  lint:
    name: Lint & type-check (backend)
    runs-on: ubuntu-latest
    # One box, not the OS/version matrix: ruff and mypy read the same source
    # everywhere, so five runs would just be five identical verdicts. Python
    # 3.12 on purpose — mypy parses numpy's 2.x stubs, which use 3.12 syntax a
    # 3.11 target chokes on. The 3.11 floor stays covered by the pytest matrix.
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src tests
      - run: uv run mypy

  backend-floating:
    name: Backend tests (latest deps)
    runs-on: ubuntu-latest
    # The lock is the safety net; this is the tripwire. It re-resolves everything
    # to the newest versions our ranges allow, so an upstream release that breaks
    # us surfaces here — on a scheduled run we triage — instead of in a user's
    # `pip install azimut`. Advisory: a red run never blocks a merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --upgrade --extra dev
      - run: uv run pytest -q

  frontend:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npx vitest run
      - run: npm run build

  browser:
    name: Browser canvas interactions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox
      - run: npm run test:e2e
